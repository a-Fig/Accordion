<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>🪗 Accordion — warm paper</title>
	<link rel="stylesheet" href="paper.css" />
	<style>
		.page-tools { position: fixed; top: 10px; left: 12px; z-index: 70; display: flex; gap: 6px; }
		.page-tools .page-switch { position: static; }
		#app-loading { height: 100vh; display: flex; align-items: center; justify-content: center; gap: 10px;
			background: #1c1810; color: #cbbf9f; font-family: "Newsreader", Georgia, serif; font-style: italic; font-size: 16px; }
	</style>
</head>
<body>
	<div class="page-tools">
		<a class="page-switch" href="index.html" title="Open the dark 'Disciplined Paper' visualizer">dark ↗</a>
		<button class="page-switch" data-act="toggleterminal" title="Show / hide the terminal pane">terminal</button>
		<button class="page-switch" data-act="toggledensity" title="Toggle cozy / compact density">density</button>
	</div>

	<div id="app-root" class="app"><div id="app-loading"><span style="font-size:24px">🪗</span> Loading Accordion…</div></div>
	<div id="overlay"></div>
	<div id="toast" class="toast"></div>

	<script src="js/sample.js"></script>
	<script src="js/parse.js"></script>
	<script src="js/model.js"></script>
	<script src="js/paper-render.js"></script>
	<script src="js/paper-app.js"></script>
</body>
</html>
